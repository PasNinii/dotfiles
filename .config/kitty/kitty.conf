# ui
background_opacity      0.8
font_family             family="CaskaydiaCove Nerd Font"
bold_font               auto
italic_font             auto
bold_italic_font        auto
font_size               12
shell                   fish
enable_audio_bell       no
include                 catppuccin-mocha.conf
hide_window_decorations yes
remember_window_size    yes

# feel
window_padding_width    8
background_blur         24
scrollback_lines        20000
# nvim as scrollback pager: -u NONE = no plugins/config, jump to bottom on open
scrollback_pager        nvim -u NONE -c "set ft=man nonumber nolist showtabline=0 foldcolumn=0" -c "autocmd VimEnter * normal G" -

# quality of life
confirm_os_window_close 0
strip_trailing_spaces   smart

# shortcut
map f11 toggle_maximized


